name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          cd packages/python
          pip install -e ".[dev]"
      - name: Lint
        run: |
          cd packages/python
          ruff check servingcard/ tests/
      - name: Test with coverage
        run: |
          cd packages/python
          pytest tests/ -v --cov=servingcard --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: packages/python/coverage.xml

  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -e packages/python
      - name: Validate all registry configs
        run: python -m servingcard validate registry/
