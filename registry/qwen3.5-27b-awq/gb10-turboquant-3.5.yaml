servingcard: "1.0"
model: qwen3.5-27b-awq
variant: turboquant-3.5-triton-native
hardware: nvidia-gb10
framework: vllm>=0.18.0rc1
author: mitkox
created: "2026-03-27"
method: published-benchmark

# HuggingFace model references
huggingface:
  base_model: Qwen/Qwen3.5-27B
  quantized_model: cyankiwi/Qwen3.5-27B-AWQ-BF16-INT4
  url: https://huggingface.co/Qwen/Qwen3.5-27B
  

# This is a dense general-purpose model, not a coding specialist.
# PawBench scores measure coding agent performance — this model may
# excel at different tasks (long-context, general reasoning, etc.)
model_type: dense-general
parameters: 27B (dense)
architecture: Qwen2ForCausalLM
license: Apache-2.0

serving:
  engine_args:
    model: cyankiwi/Qwen3.5-27B-AWQ-BF16-INT4
    quantization: awq
    max_model_len: 1010000
    kv_cache_dtype: turboquant35

capacity:
  context_limit: 1010000
  max_concurrent: 64

benchmarks:
  - author: mitkox
    status: claim
    date: "2026-03-27"
    method: inferencing-engine-blog
    source: https://www.linkedin.com/feed/update/urn:li:activity:7442931347783831553/
    source_label: "Inferencing Engine blog — cold start numbers"
    tok_s: 223.9
    peak_tok_s: 218.0
    peak_concurrency: 64
    notes: "Cold start — prefix cache hit rate 0.0%. No warm cache tricks. Triton 3.6 TQ native kernel."

  - author: zenprocess
    status: verified
    date: "2026-03-27"
    method: pawbench-full
    tok_s: 27.9
    peak_tok_s: 146.5
    peak_concurrency: 8
    ttft_ms: 10267
    quality_score: 0.693
    cacp_compliance: 0.133
    tool_call_accuracy: 0.867
    useful_token_ratio: 0.997
    steering_success_rate: 0.333
    notes: "cyankiwi/Qwen3.5-27B-AWQ-BF16-INT4 on standard vLLM 0.18 (not TurboQuant fork). 32K context (131K caused OOM on GB10 UMA). PawBench coding benchmark — this is a dense general model, not a coding specialist. Mitko's 223 tok/s claim uses mitkox/vllm-turboquant with custom Triton 3.6 TQ kernels (SM 12.1 native) which we cannot replicate on standard vLLM."

notes:
  - "DENSE MODEL — not a coding specialist. PawBench coding scores may not reflect this model's strengths."
  - "1,010,000 token context on NVIDIA GB10"
  - "1,243,968 token KV cache with TurboQuant 3.5"
  - "Requires mitkox/vllm-turboquant fork (SM 12.1 native)"
