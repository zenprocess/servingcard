servingcard: "0.1"
model: qwen3-coder
variant: fp8-eagle3-spec3
hardware: nvidia-gb10
framework: vllm>=0.8.0
author: zenprocess
created: "2025-06-15"
method: autoresearch
method_iterations: 378

description: >
  Production config. FP8 quantization with Eagle3 speculative decoding
  (3 draft tokens). Optimized over 378 autoresearch iterations on GB10.

hardware_details:
  gpu: nvidia-gb10
  memory_gb: 128
  memory_type: uma
  architecture: grace-blackwell

quantization:
  method: fp8
  bits: 8

speculative_decoding:
  method: eagle3
  draft_tokens: 3
  draft_model: aurora-spec-qwen3-coder
  acceptance_rate_healthy: 0.65
  acceptance_rate_alert_below: 0.50

benchmark:
  single_stream:
    tok_s: 69
    context: "Single request, no batching"
  parallel:
    peak_tok_s: 469
    peak_concurrency: 8
    context: "Peak throughput under parallel load"
  latency:
    ttft_ms: 1541
    context: "First-token latency includes draft model warmup"

capacity:
  context_limit: 131072
  context_soft_limit: 110000
  max_concurrent: 8
  gpu_memory_utilization: 0.90

serving:
  engine_args:
    model: qwen3-coder
    quantization: fp8
    speculative_model: aurora-spec-qwen3-coder
    num_speculative_tokens: 3
    gpu_memory_utilization: 0.90
    max_model_len: 131072
  sampling_defaults:
    temperature: 0.2
    top_p: 1.0
  sampling_notes:
    - "logit_bias: unsupported under speculative decoding"
    - "min_p: unsupported under speculative decoding"

prerequisites:
  models:
    - path: ~/models/aurora-spec-qwen3-coder
      description: "Eagle3 draft head model"
  serve_script: ~/bin/vllm-serve-eagle3.sh

readiness:
  health_endpoint: /health
  warmup_requests: 3
  warmup_prompt: "Say ok."
  warmup_max_tokens: 5

notes:
  - "CUDA graphs enabled (no enforce-eager). First 2-3 requests after restart are 3-5x slower."
  - "Draft head uses 32K/151K vocab. Non-Latin tokens fall back to baseline speed."
  - "Completion inflation ~1.8x — Eagle3 generates more tokens than requested."
